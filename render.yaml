services:
  - type: web
    name: varianz-api
    runtime: python
    plan: free
    buildCommand: pip install -e .
    startCommand: uvicorn varianz.main:app --app-dir services/api --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: APP_ENV
        value: production
      - key: AUTH_REQUIRED
        value: "true"
      - key: DATA_BACKEND
        value: supabase
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.6-luna
      - key: OPENAI_TRANSCRIPTION_MODEL
        value: whisper-1
      - key: OPENAI_REASONING_EFFORT
        value: low
      - key: OPENAI_MAX_OUTPUT_TOKENS
        value: "0"
      - key: CORS_ORIGINS
        sync: false

  - type: web
    name: varianz-web
    runtime: node
    plan: free
    rootDir: apps/web
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm start --port $PORT
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 22.17.0
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
        sync: false
